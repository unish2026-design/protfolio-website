<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNISH Store Auth</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --google-blue: #4285F4;
            --fb-bg: #f0f2f5;
            --link-blue: #2e3192;
            --text-main: #212121;
            --text-secondary: #757575;
            --border-light: #eff0f5;
            --maintenance-red: #dc2626;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        /* Maintenance Warning */
        .maintenance-banner {
            background-color: var(--maintenance-red);
            color: white;
            text-align: center;
            padding: 10px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 20px;
            box-shadow: 0 2px 4px rgba(220, 38, 38, 0.2);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.8; }
            100% { opacity: 1; }
        }

        /* Branding Section */
        .branding-container {
            text-align: center;
            margin: 20px 0 30px;
        }
        
        .brand-logo {
            max-width: 150px;
            max-height: 100px;
            width: auto;
            height: auto;
            display: block;
            margin: 0 auto 10px;
        }
        
        .brand-name {
            color: #000000;
            font-family: 'Dancing Script', cursive;
            font-size: 36px;
            font-weight: bold;
            display: block;
        }

        /* Tabs */
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border-light);
            margin-bottom: 25px;
        }
        .tab {
            flex: 1;
            padding: 12px 0;
            text-align: center;
            font-weight: 600;
            font-size: 15px;
            color: var(--text-secondary);
            cursor: pointer;
            text-transform: uppercase;
        }
        .tab.active {
            color: var(--link-blue);
            border-bottom: 3px solid var(--link-blue);
        }

        /* Buttons */
        .btn-list { display: flex; flex-direction: column; gap: 12px; }

        .auth-btn {
            width: 100%;
            height: 50px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 15px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            position: relative;
        }

        .google-btn { background-color: var(--google-blue); color: white; }
        .facebook-btn { background-color: var(--fb-bg); color: var(--text-main); }
        .option-btn { background-color: #ffffff; color: var(--text-main); border: 1px solid #d1d5db; }

        .btn-icon {
            position: absolute;
            left: 15px;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .google-icon-bg { background: white; border-radius: 50%; padding: 3px; }

        .footer-link {
            text-align: center;
            margin-top: 25px;
            color: var(--link-blue);
            font-size: 14px;
            font-weight: 500;
            display: block;
            text-decoration: none;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="maintenance-banner">
        ⚠️ Website is in maintenance
    </div>

    <div class="branding-container">
        <img src="https://www.image2url.com/r2/default/images/1776318447310-25af7478-d326-49c0-a330-00b4095ce4b8.png" alt="Logo" class="brand-logo">
        <span class="brand-name">UNISH Niraula</span>
    </div>

    <div class="tabs">
        <div class="tab active" id="loginTab" onclick="switchTab('login')">LOG IN</div>
        <div class="tab" id="signupTab" onclick="switchTab('signup')">Sign up</div>
    </div>

    <div id="loginContent" class="btn-list">
        <button class="auth-btn google-btn">
            <span class="btn-icon google-icon-bg">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="16" alt="G">
            </span>
            Log in with Google
        </button>
        <button class="auth-btn facebook-btn">
            <span class="btn-icon">
                <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" width="24" alt="F">
            </span>
            Log in with Facebook
        </button>
        <a href="#" class="footer-link">🔍 Via Password</a>
    </div>

    <div id="signupContent" class="btn-list hidden">
        <button class="auth-btn google-btn">
            <span class="btn-icon google-icon-bg">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="16" alt="G">
            </span>
            Sign up with Google
        </button>
        <button class="auth-btn facebook-btn">
            <span class="btn-icon">
                <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" width="24" alt="F">
            </span>
            Sign up with Facebook
        </button>
        <button class="auth-btn option-btn">
            <span class="btn-icon">📱</span>
            Sign up with Phone Number
        </button>
        <button class="auth-btn option-btn">
            <span class="btn-icon">✉️</span>
            Sign up with Email Address
        </button>
    </div>
</div>

<script>
    function switchTab(type) {
        const loginTab = document.getElementById('loginTab');
        const signupTab = document.getElementById('signupTab');
        const loginContent = document.getElementById('loginContent');
        const signupContent = document.getElementById('signupContent');

        if (type === 'login') {
            loginTab.classList.add('active');
            signupTab.classList.remove('active');
            loginContent.classList.remove('hidden');
            signupContent.classList.add('hidden');
        } else {
            signupTab.classList.add('active');
            loginTab.classList.remove('active');
            signupContent.classList.remove('hidden');
            loginContent.classList.add('hidden');
        }
    }
</script>

</body>
</html>
